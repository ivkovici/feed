name: Update RSS Feeds

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run feed builder (capture errors)
        run: |
          echo "Running feed builder..."
          node scripts/build-feeds.js || echo "Script failed, but continuing so we can show logs."

      - name: Show feeds.log if exists
        run: |
          echo "=== FEEDS LOG ==="
          if [ -f feeds.log ]; then
            cat feeds.log
          else
            echo "No feeds.log found."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
