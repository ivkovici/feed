name: Update RSS Feeds

on:
  schedule:
    - cron: "*/5 * * * *"   # futás 5 percenként
  workflow_dispatch:        # manuális indítás

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate feeds.json
        run: node scripts/build-feeds.js

      - name: Upload feeds.json to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public   # ide tedd a feeds.json-t

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
